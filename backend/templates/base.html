<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}VerifyFlow NG{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f7f8fb; color: #172033; }
        header { background: #0f172a; color: white; padding: 16px 28px; display: flex; justify-content: space-between; }
        header a { color: white; text-decoration: none; margin-left: 16px; }
        .container { max-width: 1080px; margin: 0 auto; padding: 28px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08); }
        .btn { background: #0f172a; color: white; padding: 10px 16px; border-radius: 8px; text-decoration: none; border: 0; cursor: pointer; display: inline-block; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        label { font-weight: 600; display: block; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f1f5f9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
        .muted { color: #64748b; }
        .messages { list-style: none; padding: 0; }
        .messages li { background: #dcfce7; padding: 10px; border-radius: 8px; margin: 8px 0; }
    </style>
</head>
<body>
<header>
    <div><strong>VerifyFlow NG</strong></div>
    <nav><a href="/">Home</a><a href="/dashboard/">Dashboard</a><a href="/admin/">Admin</a></nav>
</header>
<main class="container">
    {% if messages %}<ul class="messages">{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul>{% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
