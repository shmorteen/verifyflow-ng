services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: verifyflow_ng
      POSTGRES_USER: verifyflow
      POSTGRES_PASSWORD: verifyflow
    ports:
      - "5432:5432"
    volumes:
      - verifyflow_postgres:/var/lib/postgresql/data

  web:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret
      DEBUG: "True"
      DATABASE_URL: postgres://verifyflow:verifyflow@db:5432/verifyflow_ng
    depends_on:
      - db

volumes:
  verifyflow_postgres:
